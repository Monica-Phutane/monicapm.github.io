<!DOCTYPE html>
<html>
<head>
  <title>Skills - Monica PM</title>
  <link rel="stylesheet" href="./style.css?v=100">

  <script>
    // Skill bar animation trigger on scroll
    window.addEventListener("scroll", function () {
      const skills = document.querySelectorAll(".skill-per");
      skills.forEach(skill => {
        const rect = skill.getBoundingClientRect();
        if (rect.top < window.innerHeight - 50) {
          skill.style.width = skill.getAttribute("data-percentage");
        }
      });
    });
  </script>

</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="skills.html">Skills</a>
  <a href="projects.html">Projects</a>
  <a href="resume.html">Resume</a>
  <a href="contact.html">Contact</a>
</nav>

<div class="container">

  <div class="card">
      <h2 style="color:#0a3d62">Technical Expertise</h2>
      <p style="font-size:16px; opacity:0.8;">
        Below are my core technical competencies displayed with animated proficiency bars.
      </p>

      <!-- Python -->
      <div class="skill-box">
        <div class="skill-title">Python</div>
        <div class="skill-bar">
          <div class="skill-per" data-percentage="90%"></div>
        </div>
      </div>

      <!-- SQL -->
      <div class="skill-box">
        <div class="skill-title">SQL</div>
        <div class="skill-bar">
          <div class="skill-per" data-percentage="85%"></div>
        </div>
      </div>

      <!-- Power BI -->

        <div class="skill-title">Power BI</div>
        <div class="skill-bar">
          <div class="skill-per" data-percentage="88%"></div>
        </div>
      </div>

      <!-- Tableau -->
      <div class="skill-box">
        <div class="skill-title">Tableau</div>

        </div>

      <!-- Machine Learning -->
      <div class="skill-box">
        <div class="skill-title">Machine Learning</div>
        <div class="skill-bar">
          <div class="skill-per" data-percentage="75%"></div>
        </div>

      <!-- NLP -->

        <div class="skill-title">Natural Language Processing (NLP)</div>

  </div>

</div>

<footer>© 2026 Monica PM | Data Analyst</footer>

</html>
